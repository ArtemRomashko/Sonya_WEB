<!DOCTYPE html>
<html lang="uk" data-base="../">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Лайфхак дня – SelfMode</title>

    <link rel="icon" href="../assets/icons/Home.ico" />
    <link rel="stylesheet" href="../assets/css/style.css" />

    <style>
      .card.feature .note {
        margin-bottom: 12px !important;
      }

      .card.feature .list {
        margin-top: 0 !important;
      }
    </style>
  </head>

  <body>

    <div id="site-header"></div>

    <!-- MAIN -->
    <main class="container">
      <!-- PAGE HEAD -->
      <section class="pagehead">
        <div class="breadcrumbs">
          <a href="../index.html">Головна</a> / Лайфхак дня
        </div>

        <h1 class="h1">Лайфхак дня</h1>
        <p class="lead">
          Маленькі поради, які реально полегшують життя. Без води.
        </p>

        <div class="pills">
          <a class="pill" href="guides.html">Усі гайди</a>
          <a class="pill" href="categories.html">Категорії</a>
          <a class="pill" href="top-week.html">Топ тижня</a>
        </div>
      </section>

      <!-- LIFEHACK -->
      <section class="section">
        <div class="card feature" id="lifehack-card">
          <!-- заповнюється через JS -->
        </div>
      </section>

      <!-- MORE -->
      <section class="section">
        <div class="grid">
          <a class="card category is-disabled" href="#">
            <div class="category__name">Лайфхак завтра</div>
            <div class="category__desc">Скоро зʼявиться</div>
          </a>

          <a class="card category is-disabled" href="#">
            <div class="category__name">Архів лайфхаків</div>
            <div class="category__desc">В розробці</div>
          </a>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/transitions.js"></script>

    <script>
      const lifehacks = [
        {
          title: "5 хвилин без мотивації",
          html: `
            <p class="feature__text">
              Більшість задач здаються складними не тому, що вони реально важкі, а тому що ти їх не почав. Мозок завжди «торгується» перед стартом: чекає настрою, енергії, ідеального моменту.
            </p>
            <p class="feature__text">
              Але працює інше – просто почати на 5 хвилин.
            </p>
            <div class="card note">
              <strong>Це може бути:</strong>
            </div>
            <ul class="list">
              <li>відкрити документ і написати перше речення</li>
              <li>розібрати 1 лист у пошті</li>
              <li>зробити найменший можливий крок у задачі</li>
            </ul>
            <p class="feature__text">
              Через кілька хвилин включається ефект «я вже в процесі», і опір падає. Часто ти продовжуєш просто тому, що вже почав.
            </p>
          `
        },
        {
          title: "Один день – одне завдання",
          html: `
            <p class="feature__text">
              Якщо ранок починається без плану, день швидко розпадається на дрібні речі: соцмережі, повідомлення, випадкові справи.
            </p>
            <p class="feature__text">
              Але якщо зранку є одна чітка задача, день стає структурованим.
            </p>
            <div class="card note">
              <strong>Наприклад:</strong>
            </div>
            <ul class="list">
              <li>«зробити і здати конспект»</li>
              <li>«написати резюме і відгукнутись на 2 вакансії»</li>
              <li>«розібрати навчальний матеріал по одній темі»</li>
            </ul>
            <p class="feature__text">
              Навіть якщо ти зробиш більше – ця одна задача тримає фокус і не дає «розсипатись» на хаос.
            </p>
          `
        },
        {
          title: "Не забороняй – замінюй",
          html: `
            <p class="feature__text">
              Якщо просто сказати собі «не скролити телефон», мозок все одно тягнеться до звички. Порожнє місце він не любить.
            </p>
            <p class="feature__text">
              Працює інше: заміна.
            </p>
            <div class="card note">
              <strong>Наприклад:</strong>
            </div>
            <ul class="list">
              <li>замість бездумного скролу – відкрити музику і піти прогулятись</li>
              <li>замість постійного TikTok – 5 хвилин нотаток або плану дня</li>
              <li>замість «залипання перед сном» – коротке читання або подкаст</li>
            </ul>
            <p class="feature__text">
              Звичка не зникає одразу, але поступово змінює маршрут поведінки.
            </p>
          `
        },
        {
          title: "Знайди друга",
          html: `
            <p class="feature__text">
              Присутність іншої людини зменшує внутрішній опір і допомагає просто почати.
            </p>
            <p class="feature__text">
              Навіть якщо ви нічого не робите «разом» напряму, сама домовленість уже підштовхує не відкладати справу.
            </p>
            <div class="card note">
              <strong>Наприклад:</strong>
            </div>
            <ul class="list">
              <li>піти разом у зал</li>
              <li>домовитись з другом разом сісти за навчання</li>
              <li>одночасно зробити неприємну справу: дзвінок, документи, важкий лист</li>
            </ul>
          `
        },
        {
          title: "Не намагайся заснути",
          html: `
            <p class="feature__text">
              Чим сильніше ти стараєшся заснути, тим більше мозок тримає тебе в активному режимі. Це створює зайву напругу і тільки відтягує сон.
            </p>
            <p class="feature__text">
              Замість цього працює інше: зняти фокус із «я маю заснути» і переключитись на щось нейтральне.
            </p>
            <div class="card note">
              <strong>Спробуй:</strong>
            </div>
            <ul class="list">
              <li>відкласти телефон і приглушити світло</li>
              <li>зосередитись на диханні або спокійних думках</li>
              <li>просто полежати і не контролювати процес</li>
            </ul>
            <p class="feature__text">
              Часто сон приходить саме тоді, коли ти перестаєш його «ловити».
            </p>
          `
        },
        {
          title: "Запам'ятовуй вголос",
          html: `
            <p class="feature__text">
              Коли ти просто читаєш, здається, що все зрозуміло. Але це часто ілюзія – інформація знайома, але не засвоєна.
            </p>
            <p class="feature__text">
              Коли ти пробуєш пояснити її вголос, одразу видно прогалини: де ти плутаєшся, забуваєш або не можеш сформулювати просто. Це і є справжній рівень розуміння.
            </p>
            <div class="card note">
              <strong>Спробуй:</strong>
            </div>
            <ul class="list">
              <li>після вивчення теми поясни її вголос – собі або комусь</li>
              <li>використовуй прості слова, ніби пояснюєш людині без підготовки</li>
              <li>якщо виходить легко – ти реально розібрався</li>
            </ul>
          `
        },
        {
          title: "Припущення ≠ факти",
          html: `
            <p class="feature__text">
              Тривога часто починається з думок у стилі «а раптом…», які здаються правдою, хоча це лише сценарії в голові.
            </p>
            <p class="feature__text">
              Спробуй розділити ситуацію на дві частини.
            </p>
            <div class="card note">
              <strong>Наприклад:</strong><br/>
              факт – «не відповіли 2 години»<br/>
              припущення – «на мене образились»
            </div>
            <ul class="list">
              <li>факти – що ти точно знаєш</li>
              <li>припущення – що ти додумуєш</li>
            </ul>
            <p class="feature__text">
              Коли це розділяєш, стає значно менше простору для накручування.
            </p>
          `
        }
      ];

      const dayIndex = Math.floor(Date.now() / 86400000) % lifehacks.length;
      const lh = lifehacks[dayIndex];

      document.getElementById('lifehack-card').innerHTML =
        `<h2 class="feature__title">💡 ${lh.title}</h2>` + lh.html;
    </script>
  </body>
</html>
