<!DOCTYPE html>
<html lang="uk" data-base="../">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Лайфхак дня – SelfMode</title>

    <link rel="icon" href="../assets/icons/Home.ico" />
    <link rel="stylesheet" href="../assets/css/style.css" />

    <style>
      .card.feature .note {
        margin-bottom: 12px !important;
      }

      .card.feature .list {
        margin-top: 0 !important;
      }
    </style>
  </head>

  <body>

    <div id="site-header"></div>

    <!-- MAIN -->
    <main class="container">
      <!-- PAGE HEAD -->
      <section class="pagehead">
        <div class="breadcrumbs">
          <a href="../index.html">Головна</a> / Лайфхак дня
        </div>

        <h1 class="h1">Лайфхак дня</h1>
        <p class="lead">
          Маленькі поради, які реально полегшують життя. Без води.
        </p>

        <div class="pills">
          <a class="pill" href="guides.html">Усі гайди</a>
          <a class="pill" href="categories.html">Категорії</a>
          <a class="pill" href="top-week.html">Топ тижня</a>
        </div>
      </section>

      <!-- LIFEHACK -->
      <section class="section">
        <div class="card feature" id="lifehack-card">
          <!-- заповнюється через JS -->
        </div>
      </section>

      <!-- MORE -->
      <section class="section">
        <div class="grid">
          <a class="card category" id="btn-tomorrow" href="lifehack.html?offset=1">
            <div class="category__name">Лайфхак завтра</div>
            <div class="category__desc">Подивитись заздалегідь</div>
          </a>

          <a class="card category" href="lifehacks-archive.html">
            <div class="category__name">Архів лайфхаків</div>
            <div class="category__desc">Усі лайфхаки списком</div>
          </a>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/transitions.js"></script>
    <script src="../assets/js/lifehacks-data.js"></script>
    <script>
      const params  = new URLSearchParams(window.location.search);
      const offset  = parseInt(params.get('offset') || '0', 10);
      const todayIdx = Math.floor(Date.now() / 86400000) % lifehacks.length;
      const dayIndex = (todayIdx + offset) % lifehacks.length;
      const lh = lifehacks[dayIndex];

      if (offset === 1) {
        document.querySelector('.h1').textContent = 'Лайфхак завтра';
        document.title = 'Лайфхак завтра – SelfMode';
        const btn = document.getElementById('btn-tomorrow');
        btn.href = 'lifehack.html';
        btn.querySelector('.category__name').textContent = 'Лайфхак сьогодні';
        btn.querySelector('.category__desc').textContent = 'Повернутись до поточного';
      }

      document.getElementById('lifehack-card').innerHTML =
        `<h2 class="feature__title">💡 ${lh.title}</h2>` + lh.html;
    </script>
  </body>
</html>
